<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Call Timer | Harish's Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* High-end Dark Palette using HSL */
    --bg: hsl(240, 25%, 4%);
    --surface: hsl(240, 22%, 7%);
    --card: rgba(22, 22, 33, 0.45);
    --card-solid: hsl(240, 22%, 9%);
    --border: rgba(255, 255, 255, 0.04);
    --border-hover: rgba(255, 255, 255, 0.08);
    --accent: hsl(250, 89%, 68%); /* Electric Violet */
    --accent-glow: hsla(250, 89%, 68%, 0.15);
    --accent2: hsl(350, 89%, 65%); /* Neon Sunset Pink */
    --accent2-glow: hsla(350, 89%, 65%, 0.15);
    --green: hsl(142, 70%, 50%); /* Emerald Mint */
    --green-glow: hsla(142, 70%, 50%, 0.15);
    --yellow: hsl(38, 92%, 50%);
    --text: hsl(240, 10%, 93%);
    --muted: hsl(240, 6%, 60%);
    --font: 'Outfit', 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Background Glowing Orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    animation: floatingOrb 28s infinite alternate ease-in-out;
  }
  .orb-1 {
    top: -10%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  }
  .orb-2 {
    bottom: -15%;
    right: -5%;
    width: 55vw;
    height: 55vw;
    background: radial-gradient(circle, var(--accent2) 0%, transparent 75%);
    animation-delay: -12s;
  }
  @keyframes floatingOrb {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(4%, 6%) scale(1.08); }
    100% { transform: translate(-3%, -4%) scale(0.92); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
    padding: 1.5rem;
    text-align: center;
  }

  /* ── Card Layout ── */
  .timer-card {
    background: rgba(16, 16, 24, 0.65);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 3.5rem 2.5rem;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.2rem;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }

  .timer-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.03),
      transparent
    );
    transition: 0.8s ease-in-out;
    pointer-events: none;
  }

  .timer-card:hover::before {
    left: 150%;
  }

  .timer-card.ended {
    border-color: rgba(255, 95, 126, 0.4);
    box-shadow: 0 30px 80px rgba(255, 95, 126, 0.12);
    transform: scale(0.98);
  }

  /* ── Status Indicator ── */
  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    padding: 0.5rem 1.4rem;
    border-radius: 100px;
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--green);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    backdrop-filter: blur(8px);
  }

  .status-pill.offline {
    color: var(--accent2);
    border-color: rgba(255, 95, 126, 0.2);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    position: relative;
  }

  .status-dot::after {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    right: -4px;
    bottom: -4px;
    border-radius: 50%;
    border: 1px solid var(--green);
    opacity: 0.8;
    animation: statusRing 2.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
  }

  .status-pill.offline .status-dot {
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
  }
  .status-pill.offline .status-dot::after {
    display: none;
  }

  @keyframes statusRing {
    0% { transform: scale(0.5); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* ── Call Graphic ── */
  .avatar-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 0.5rem;
  }

  .avatar {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--accent), var(--green));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    box-shadow: 0 12px 32px rgba(124, 110, 247, 0.35);
    z-index: 2;
    position: relative;
    transition: all 0.5s ease;
  }

  .timer-card.ended .avatar {
    background: linear-gradient(135deg, var(--muted), var(--accent2));
    box-shadow: 0 12px 32px rgba(255, 95, 126, 0.2);
  }

  /* Wave Rings */
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(0, 230, 118, 0.25);
    z-index: 1;
    animation: ripple 3s linear infinite;
    pointer-events: none;
  }

  .ring:nth-child(2) { animation-delay: 1s; border-color: rgba(124, 110, 247, 0.2); }
  .ring:nth-child(3) { animation-delay: 2s; border-color: rgba(255, 95, 126, 0.15); }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* ── Digital Clock ── */
  .clock-container {
    margin: 0.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .time-display {
    font-family: var(--mono);
    font-size: 5.2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(240, 240, 247, 0.12);
    transition: all 0.5s ease;
  }

  .time-display.active {
    color: var(--green);
    text-shadow: 0 0 50px rgba(0, 230, 118, 0.35);
  }

  .time-display.ended {
    color: var(--accent2);
    text-shadow: 0 0 50px rgba(255, 95, 126, 0.35);
  }

  .clock-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 500;
  }

  /* ── Info & Details ── */
  .details-wrap {
    width: 100%;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    padding: 1.4rem;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
  }

  .detail-label {
    color: var(--muted);
    font-family: var(--mono);
    font-weight: 500;
  }

  .detail-val {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Waveform bars ── */
  .mini-waveform {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 24px;
  }

  .mini-bar {
    width: 3px;
    height: 4px;
    background: var(--green);
    border-radius: 3px;
    animation: waveActive 0.8s ease-in-out infinite;
  }

  .mini-bar:nth-child(1) { animation-delay: 0.1s; }
  .mini-bar:nth-child(2) { animation-delay: 0.2s; }
  .mini-bar:nth-child(3) { animation-delay: 0.3s; }
  .mini-bar:nth-child(4) { animation-delay: 0.2s; }
  .mini-bar:nth-child(5) { animation-delay: 0.1s; }

  @keyframes waveActive {
    0%, 100% { height: 4px; }
    50% { height: 20px; }
  }

  .timer-card.ended .mini-bar {
    background: var(--muted);
    animation: none;
    height: 3px;
  }

  /* ── Alert Banner ── */
  .alert-banner {
    width: 100%;
    background: rgba(255, 95, 126, 0.1);
    border: 1px solid rgba(255, 95, 126, 0.2);
    color: var(--accent2);
    padding: 1rem;
    border-radius: 16px;
    font-size: 0.82rem;
    font-family: var(--mono);
    display: none;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    box-shadow: 0 4px 15px rgba(255,95,126,0.1);
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes slideDown {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .btn-dashboard {
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.9rem 1.8rem;
    border-radius: 16px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none;
    font-family: var(--font);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
  }

  .btn-dashboard:hover {
    border-color: var(--accent);
    background: rgba(124,110,247,0.1);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }
</style>
</style>
</head>
<body>

<div class="container">
  <div class="timer-card" id="timerCard">
    <!-- Status Pill -->
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Call Online</span>
    </div>

    <!-- Avatar Graphic -->
    <div class="avatar-wrap" id="avatarWrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="avatar" id="avatarIcon">🗣️</div>
    </div>

    <!-- Clock Display -->
    <div class="clock-container">
      <div class="time-display active" id="clock">00:00</div>
      <div class="clock-label" id="clockLabel">Call Duration</div>
    </div>

    <!-- Call Details -->
    <div class="details-wrap">
      <div class="detail-row">
        <span class="detail-label">Active Connection</span>
        <span class="detail-val" id="callerVal">Harish Voice AI</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Call Type</span>
        <span class="detail-val" id="callerPhone">Inbound</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Voice Processor</span>
        <div class="mini-waveform" id="miniWaveform">
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
        </div>
      </div>
    </div>

    <!-- Alert / Redirection status banner -->
    <div class="alert-banner" id="alertBanner">
      ⚠️ Call has ended. Redirecting to dashboard...
    </div>

    <!-- Manual Return -->
    <a href="/" class="btn-dashboard">
      🏠 Return to Dashboard
    </a>
  </div>
</div>

<script>
  let startTime = null;
  let timerInterval = null;
  let pollInterval = null;
  let callEnded = false;

  // Poll server for active call status
  async function pollStatus() {
    if (callEnded) return;

    try {
      const response = await fetch('/timer/status');
      const data = await response.json();

      if (!data.active) {
        handleCallEnded();
      } else {
        updateCallState(data.status, data.startedAt, data.fromNumber);
      }
    } catch (e) {
      console.error('Error polling status:', e);
    }
  }

  function updateCallState(status, startedAt, fromNumber) {
    if (fromNumber) {
      document.getElementById('callerPhone').textContent = fromNumber;
      if (fromNumber.toLowerCase().includes('browser')) {
        document.getElementById('callerVal').textContent = 'Browser Mic Client';
      } else {
        document.getElementById('callerVal').textContent = 'Active Twilio Line';
      }
    }

    const tickingStatuses = ['initiated', 'ringing', 'in-progress'];
    const connectingStatuses = ['dialing', 'queued'];

    if (tickingStatuses.includes(status)) {
      // Call is online! Start timer.
      document.getElementById('statusText').textContent = 'Call Online';
      const statusPill = document.getElementById('statusPill');
      statusPill.className = 'status-pill'; // Reset styles
      statusPill.removeAttribute('style');
      document.querySelector('.status-dot').removeAttribute('style');

      document.getElementById('clockLabel').textContent = 'Call Duration';
      document.getElementById('avatarIcon').textContent = '🗣️';
      document.getElementById('clock').className = 'time-display active';

      if (!startTime && startedAt) {
        startTime = new Date(startedAt).getTime();
        startTimer();
      }
    } else if (connectingStatuses.includes(status)) {
      // Call is connecting (dialing, queued)
      document.getElementById('statusText').textContent = 'Connecting...';
      const statusPill = document.getElementById('statusPill');
      statusPill.className = 'status-pill';
      statusPill.style.color = 'var(--yellow)';
      statusPill.style.borderColor = 'rgba(251, 191, 36, 0.3)';
      document.querySelector('.status-dot').style.backgroundColor = 'var(--yellow)';
      document.querySelector('.status-dot').style.boxShadow = '0 0 10px var(--yellow)';

      document.getElementById('clockLabel').textContent = 'Waiting for Answer';
      document.getElementById('clock').textContent = '00:00';
      document.getElementById('clock').className = 'time-display'; // standard white color
      document.getElementById('avatarIcon').textContent = '📞';

      // Keep startTime null so that we don't start the clock ticking
      startTime = null;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    updateClock();
    timerInterval = setInterval(updateClock, 1000);
  }

  function updateClock() {
    if (!startTime || callEnded) return;

    const diff = Math.floor((Date.now() - startTime) / 1000);
    // Safety check for negative difference due to system clock offsets
    const safeDiff = diff < 0 ? 0 : diff;

    const mins = String(Math.floor(safeDiff / 60)).padStart(2, '0');
    const secs = String(safeDiff % 60).padStart(2, '0');

    document.getElementById('clock').textContent = `${mins}:${secs}`;
  }

  function handleCallEnded() {
    callEnded = true;
    
    // Stop intervals
    if (timerInterval) clearInterval(timerInterval);
    if (pollInterval) clearInterval(pollInterval);

    // Apply "Ended" styles
    const card = document.getElementById('timerCard');
    card.classList.add('ended');

    const clock = document.getElementById('clock');
    clock.className = 'time-display ended';

    const statusPill = document.getElementById('statusPill');
    statusPill.className = 'status-pill offline';
    document.getElementById('statusText').textContent = 'Disconnected';

    document.getElementById('avatarIcon').textContent = '📵';
    document.getElementById('clockLabel').textContent = 'Final Duration';

    // Remove animation ripple rings
    const rings = document.querySelectorAll('.ring');
    rings.forEach(r => r.style.display = 'none');

    // Show alert banner
    document.getElementById('alertBanner').style.display = 'flex';

    // Redirect to homepage after 3 seconds
    setTimeout(() => {
      window.location.href = '/';
    }, 3000);
  }

  // Initial check
  pollStatus();
  // Poll call status every 1.5 seconds
  pollInterval = setInterval(pollStatus, 1500);
</script>
</body>
</html>
